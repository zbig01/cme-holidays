name: Update CrossTrade Holiday JSON

on:
  schedule:
    - cron: "0 0 * * 0" # Runs every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium

      # If you are using the "Sidedoor" script, it only needs requests.
      # But keeping the others ensures Playwright still works if you switch back.

      - name: Run Scraper
        run: python scrape.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add crosstrade.json
          git commit -m "Auto-update holiday JSON" || echo "No changes to commit"
          git push