name: Update CrossTrade Holiday JSON

on:
  schedule:
    # Runs at 12:00 PM UTC on every Sunday (Adjusted for freshness)
    - cron: "0 0 * * 0"
  workflow_dispatch: # Allows you to click "Run Workflow" manually

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml
          playwright install chromium

      - name: Run Scraper
        run: python scrape.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add crosstrade.json
          git commit -m "Auto-update CrossTrade holiday JSON" || echo "No changes"
          git push