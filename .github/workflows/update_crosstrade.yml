name: Update CrossTrade Holiday JSON

on:
  schedule:
    - cron: "0 12 5 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Scrape CrossTrade and update JSON
        run: |
          python3 << 'EOF'
          import requests, json
          from bs4 import BeautifulSoup

          url = "https://www.cmegroup.com/tools-information/holiday-calendar.html"
          html = requests.get(url, timeout=20).text
          soup = BeautifulSoup(html, "lxml")

          rows = soup.select("table.holiday-calendar-table tbody tr")

          data = []
          for r in rows:
              cols = [c.get_text(strip=True) for c in r.find_all("td")]
              if len(cols) >= 3:
                  date, market, hours = cols[:3]
                  data.append({
                      "date": date,
                      "market": market,
                      "hours": hours
                  })

          with open("crosstrade.json", "w") as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add crosstrade.json
          git commit -m "Auto-update CrossTrade holiday JSON" || echo "No changes"
          git push
